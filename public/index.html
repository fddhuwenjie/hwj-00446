<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多人实时协作画板</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>多人实时协作画板</h2>
      <div class="form-group">
        <label>用户名:</label>
        <input type="text" id="userName" placeholder="请输入用户名" maxlength="20">
      </div>
      <div class="form-actions">
        <button id="createRoomBtn" class="btn btn-primary">创建房间</button>
        <div class="join-room">
          <input type="text" id="roomCodeInput" placeholder="房间号 (6位)" maxlength="6">
          <button id="joinRoomBtn" class="btn btn-secondary">加入房间</button>
        </div>
      </div>
      <p class="hint">提示：演示房间号 DEMO01</p>
    </div>
  </div>

  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <h1>🎨 协作画板</h1>
        <span class="room-info">房间: <span id="roomCodeDisplay">------</span></span>
        <span class="lock-status" id="lockStatus"></span>
      </div>
      <div class="topbar-right">
        <button id="undoBtn" class="btn btn-small" title="撤销 (Ctrl+Z)">↶ 撤销</button>
        <button id="redoBtn" class="btn btn-small" title="重做 (Ctrl+Y)">↷ 重做</button>
        <button id="exportPngBtn" class="btn btn-small">导出PNG</button>
        <button id="exportSvgBtn" class="btn btn-small">导出SVG</button>
      </div>
    </header>

    <div class="main-container">
      <aside class="sidebar left-sidebar">
        <div class="tool-section">
          <h3>绘图工具</h3>
          <div class="tool-buttons">
            <button class="tool-btn active" data-tool="freehand" title="自由画笔">✏️</button>
            <button class="tool-btn" data-tool="line" title="直线">📏</button>
            <button class="tool-btn" data-tool="rect" title="矩形">⬜</button>
            <button class="tool-btn" data-tool="circle" title="圆形">⭕</button>
            <button class="tool-btn" data-tool="eraser" title="橡皮擦">🧽</button>
            <button class="tool-btn" data-tool="text" title="文字">📝</button>
            <button class="tool-btn" data-tool="select" title="选区工具">🔲</button>
          </div>
        </div>

        <div class="tool-section">
          <h3>画笔模式</h3>
          <div class="brush-modes">
            <button class="brush-mode-btn active" data-brush-mode="normal" title="正常模式">实线</button>
            <button class="brush-mode-btn" data-brush-mode="dashed" title="虚线模式">虚线</button>
            <button class="brush-mode-btn" data-brush-mode="highlighter" title="荧光笔模式">荧光</button>
          </div>
        </div>

        <div class="tool-section" id="selectionActions" style="display: none;">
          <h3>选区操作</h3>
          <div class="selection-actions">
            <button id="deleteSelectionBtn" class="btn btn-small btn-danger">删除 (Del)</button>
            <button id="copySelectionBtn" class="btn btn-small btn-primary">复制 (Ctrl+C)</button>
            <button id="pasteSelectionBtn" class="btn btn-small btn-secondary">粘贴 (Ctrl+V)</button>
          </div>
        </div>

        <div class="tool-section">
          <h3>颜色</h3>
          <div class="color-palette">
            <div class="color-swatch active" style="background: #000000" data-color="#000000"></div>
            <div class="color-swatch" style="background: #ffffff; border: 1px solid #ccc" data-color="#ffffff"></div>
            <div class="color-swatch" style="background: #e74c3c" data-color="#e74c3c"></div>
            <div class="color-swatch" style="background: #e67e22" data-color="#e67e22"></div>
            <div class="color-swatch" style="background: #f39c12" data-color="#f39c12"></div>
            <div class="color-swatch" style="background: #2ecc71" data-color="#2ecc71"></div>
            <div class="color-swatch" style="background: #1abc9c" data-color="#1abc9c"></div>
            <div class="color-swatch" style="background: #3498db" data-color="#3498db"></div>
            <div class="color-swatch" style="background: #2980b9" data-color="#2980b9"></div>
            <div class="color-swatch" style="background: #9b59b6" data-color="#9b59b6"></div>
            <div class="color-swatch" style="background: #8e44ad" data-color="#8e44ad"></div>
            <div class="color-swatch" style="background: #34495e" data-color="#34495e"></div>
            <div class="color-swatch" style="background: #7f8c8d" data-color="#7f8c8d"></div>
            <div class="color-swatch" style="background: #95a5a6" data-color="#95a5a6"></div>
            <div class="color-swatch" style="background: #bdc3c7" data-color="#bdc3c7"></div>
            <div class="color-swatch" style="background: #ecf0f1" data-color="#ecf0f1"></div>
          </div>
          <div class="custom-color">
            <input type="color" id="colorPicker" value="#000000">
            <input type="text" id="hexInput" placeholder="#HEX" value="#000000" maxlength="7">
          </div>
        </div>

        <div class="tool-section">
          <h3>笔刷大小: <span id="sizeValue">3</span>px</h3>
          <input type="range" id="sizeSlider" min="1" max="20" value="3" class="slider">
        </div>

        <div class="tool-section">
          <h3>当前图层</h3>
          <div class="layer-selector">
            <button class="layer-btn" data-layer="background">背景层</button>
            <button class="layer-btn active" data-layer="middle">中间层</button>
            <button class="layer-btn" data-layer="foreground">前景层</button>
          </div>
        </div>
      </aside>

      <main class="canvas-container">
        <div class="canvas-wrapper">
          <canvas id="bgCanvas" class="board-canvas"></canvas>
          <canvas id="middleCanvas" class="board-canvas"></canvas>
          <canvas id="fgCanvas" class="board-canvas"></canvas>
          <canvas id="previewCanvas" class="board-canvas"></canvas>
          <div id="cursorsContainer" class="cursors-container"></div>
          <div id="readonlyOverlay" class="readonly-overlay hidden">
            <span>🔒 画布已锁定</span>
          </div>
          <div id="viewportInfo" class="viewport-info">
            <span id="zoomLevel">100%</span>
            <span id="coordinates">X: 0, Y: 0</span>
          </div>
        </div>
      </main>

      <aside class="sidebar right-sidebar">
        <div class="tool-section">
          <h3>用户列表 (<span id="userCount">0</span>/8)</h3>
          <div id="userList" class="user-list"></div>
        </div>

        <div class="tool-section">
          <h3>图层管理</h3>
          <div class="layer-manager">
            <div class="layer-item" data-layer="foreground">
              <div class="layer-header">
                <span class="layer-name">前景层</span>
                <label class="toggle">
                  <input type="checkbox" class="layer-visible" data-layer="foreground" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="layer-opacity">
                <span>透明度:</span>
                <input type="range" class="opacity-slider" data-layer="foreground" min="0" max="100" value="100">
                <span class="opacity-value">100%</span>
              </div>
            </div>

            <div class="layer-item" data-layer="middle">
              <div class="layer-header">
                <span class="layer-name">中间层</span>
                <label class="toggle">
                  <input type="checkbox" class="layer-visible" data-layer="middle" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="layer-opacity">
                <span>透明度:</span>
                <input type="range" class="opacity-slider" data-layer="middle" min="0" max="100" value="100">
                <span class="opacity-value">100%</span>
              </div>
            </div>

            <div class="layer-item" data-layer="background">
              <div class="layer-header">
                <span class="layer-name">背景层</span>
                <label class="toggle">
                  <input type="checkbox" class="layer-visible" data-layer="background" checked>
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="layer-opacity">
                <span>透明度:</span>
                <input type="range" class="opacity-slider" data-layer="background" min="0" max="100" value="100">
                <span class="opacity-value">100%</span>
              </div>
            </div>
          </div>
        </div>

        <div class="tool-section admin-section" id="adminSection">
          <h3>管理功能</h3>
          <button id="clearCanvasBtn" class="btn btn-danger btn-block">清空画布</button>
          <button id="toggleLockBtn" class="btn btn-warning btn-block">锁定画布</button>
          <button id="replayBtn" class="btn btn-info btn-block">回放模式</button>
        </div>

        <div class="tool-section">
          <h3>历史快照</h3>
          <button id="loadSnapshotsBtn" class="btn btn-small btn-block">加载快照列表</button>
          <div id="snapshotList" class="snapshot-list"></div>
        </div>
      </aside>
    </div>

    <div id="replayModal" class="modal hidden">
      <div class="modal-content">
        <h2>🎬 回放模式</h2>
        <div class="replay-controls">
          <button id="replayPlayBtn" class="btn btn-primary">▶ 播放</button>
          <button id="replayPauseBtn" class="btn btn-secondary">⏸ 暂停</button>
          <button id="replayResetBtn" class="btn btn-secondary">↺ 重置</button>
          <span class="replay-speed">
            速度:
            <select id="replaySpeed">
              <option value="0.5">0.5x</option>
              <option value="1" selected>1x</option>
              <option value="2">2x</option>
              <option value="5">5x</option>
            </select>
          </span>
        </div>
        <div class="replay-progress">
          <input type="range" id="replayProgress" min="0" max="100" value="0" class="slider">
          <span id="replayStatus">0 / 0 笔</span>
        </div>
        <button id="replayCloseBtn" class="btn btn-small">关闭回放</button>
      </div>
    </div>

    <div id="textInputModal" class="modal hidden">
      <div class="modal-content">
        <h2>输入文字</h2>
        <div class="form-group">
          <textarea id="textInput" rows="3" placeholder="请输入文字..."></textarea>
        </div>
        <div class="form-actions">
          <button id="textCancelBtn" class="btn btn-secondary">取消</button>
          <button id="textConfirmBtn" class="btn btn-primary">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
